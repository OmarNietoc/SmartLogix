server:
  port: ${SERVER_PORT:8761}

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: eureka-server

eureka:
  instance:
    hostname: localhost
  client:
    registerWithEureka: false
    fetchRegistry: false
    serviceUrl:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
